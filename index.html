<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Desarrollo Web Freelance</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 0 auto; }
        h1 { color: #1a1a1a; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 14px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hagamos algo grande juntos</h1>
    <p>Cuéntame qué tienes en mente y te responderé en menos de 24 horas.</p>
    
    <form action="#" method="POST">
        <label for="name">Nombre</label>
        <input type="text" id="name" name="name" placeholder="Tu nombre" required>

        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required>

        <label for="project">Tipo de Proyecto</label>
        <select id="project" name="project">
            <option value="landing">Landing Page</option>
            <option value="ecommerce">Tienda Online (E-commerce)</option>
            <option value="corporate">Web Corporativa / Empresa</option>
            <option value="other">Otro servicio</option>
        </select>

        <label for="message">Cuéntame sobre tu negocio</label>
        <textarea id="message" name="message" rows="5" placeholder="¿Qué objetivos quieres lograr con tu nueva web?" required></textarea>

        <button type="submit">Enviar Mensaje</button>
    </form>
</div>

</body>
</html>
